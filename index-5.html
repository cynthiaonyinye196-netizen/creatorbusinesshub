<style>
/* ===== Design tokens ===== */
:root{
  --brown-primary:#5C3A21;
  --brown-secondary:#8B5E3C;
  --cream:#F8F2E7;
  --beige:#EADCC8;
  --white:#FFFFFF;
  --text:#3A2A1B;
  --text-soft:#7A6650;
  --success:#3E7A4D;
  --warning:#B8792B;
  --danger:#B14444;
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --shadow-soft:0 4px 16px rgba(92,58,33,0.08);
  --shadow-lift:0 10px 30px rgba(92,58,33,0.14);
  --font-heading:'Poppins',sans-serif;
  --font-body:'Inter',sans-serif;
  --bg:var(--cream);
  --surface:var(--white);
  --border:rgba(92,58,33,0.12);
}
[data-theme="dark"]{
  --bg:#241811;
  --surface:#2E2018;
  --text:#F3E9DD;
  --text-soft:#C9B49B;
  --border:rgba(248,242,231,0.12);
  --cream:#2E2018;
  --beige:#3A281D;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  overscroll-behavior-y:none;
  transition:background .3s ease, color .3s ease;
}
h1,h2,h3,h4{font-family:var(--font-heading); margin:0 0 4px; color:var(--text);}
p{margin:0; color:var(--text-soft);}
button{font-family:var(--font-body); cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
.hidden{display:none !important;}
::selection{background:var(--brown-secondary); color:var(--white);}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}

/* ===== Splash ===== */
#splash{
  position:fixed; inset:0; z-index:999;
  background:linear-gradient(160deg,var(--brown-primary),var(--brown-secondary));
  display:flex; align-items:center; justify-content:center;
  animation:fadeOut .6s ease 1.8s forwards;
}
.splash-inner{text-align:center; color:var(--white); padding:0 32px;}
.splash-mark{
  width:76px;height:76px;margin:0 auto 20px;border-radius:22px;
  background:rgba(248,242,231,0.14); border:1px solid rgba(248,242,231,0.3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-heading); font-weight:800; font-size:28px; letter-spacing:1px;
  animation:popIn .7s cubic-bezier(.2,.9,.3,1.2);
}
.splash-inner h1{color:var(--white); font-size:24px; font-weight:700; margin-bottom:8px;}
.splash-inner p{color:rgba(248,242,231,0.85); font-size:14px;}
.splash-loader{margin-top:28px; display:flex; gap:8px; justify-content:center;}
.splash-loader span{
  width:8px;height:8px;border-radius:50%;background:var(--white);
  opacity:.4; animation:bounce 1.1s infinite ease-in-out;
}
.splash-loader span:nth-child(2){animation-delay:.15s;}
.splash-loader span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4;} 40%{transform:translateY(-6px);opacity:1;}}
@keyframes popIn{0%{transform:scale(.6);opacity:0;} 100%{transform:scale(1);opacity:1;}}
@keyframes fadeOut{to{opacity:0; visibility:hidden;}}

/* ===== App shell ===== */
#app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg);}
#app-header{position:sticky; top:0; z-index:40; background:var(--bg); padding-top:calc(env(safe-area-inset-top,0px) + 14px); border-bottom:1px solid var(--border);}
.header-top{display:flex; align-items:center; justify-content:space-between; padding:0 18px 12px;}
.brand-mark{display:flex; align-items:center; gap:10px;}
.brand-mark-icon{
  width:34px;height:34px;border-radius:10px;background:var(--brown-primary);color:var(--white);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:13px;
}
.brand-mark-text{font-family:var(--font-heading); font-weight:700; font-size:16px;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text);
  transition:transform .15s ease, background .2s ease;
}
.icon-btn:active{transform:scale(.9);}

.subtabs{display:flex; gap:8px; overflow-x:auto; padding:0 18px 14px; scrollbar-width:none;}
.subtabs::-webkit-scrollbar{display:none;}
.subtab{
  flex:0 0 auto; padding:8px 16px; border-radius:999px; border:1px solid var(--border);
  background:var(--surface); color:var(--text-soft); font-size:13px; font-weight:600; white-space:nowrap;
  transition:all .2s ease;
}
.subtab.active{background:var(--brown-primary); color:var(--white); border-color:var(--brown-primary);}

#content{flex:1; padding:18px 18px 100px; animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* ===== Bottom nav ===== */
.bottom-nav{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px;
  display:flex; background:var(--surface); border-top:1px solid var(--border);
  padding:8px 6px calc(env(safe-area-inset-bottom,0px) + 8px); z-index:50;
  box-shadow:0 -6px 20px rgba(92,58,33,0.06);
}
.nav-item{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 2px; color:var(--text-soft); border-radius:12px; transition:color .2s ease;
}
.nav-item .nav-icon{font-size:18px;}
.nav-item .nav-label{font-size:10px; font-weight:600;}
.nav-item.active{color:var(--brown-primary);}
.nav-item.active .nav-icon{transform:translateY(-1px);}

.fab{
  position:fixed; right:max(18px, calc((100vw - 520px) / 2 + 18px)); bottom:88px; z-index:45;
  width:54px;height:54px;border-radius:50%; border:none; background:var(--brown-primary); color:var(--white);
  font-size:26px; box-shadow:var(--shadow-lift); transition:transform .15s ease;
  display:flex; align-items:center; justify-content:center; line-height:1;
}
.fab:active{transform:scale(.9) rotate(90deg);}

/* ===== Cards & components ===== */
.card{
  background:var(--surface); border-radius:var(--radius-lg); padding:18px; box-shadow:var(--shadow-soft);
  border:1px solid var(--border); margin-bottom:14px;
}
.card-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.section-title{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-soft); font-weight:700; margin:22px 0 10px;}
.section-title:first-child{margin-top:0;}

.greeting{font-size:22px; font-weight:700; margin-bottom:2px;}
.subgreeting{font-size:13px; margin-bottom:18px;}

.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.stat-card{background:var(--surface); border-radius:var(--radius-md); padding:14px; border:1px solid var(--border); box-shadow:var(--shadow-soft);}
.stat-card .stat-label{font-size:11px; color:var(--text-soft); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
.stat-card .stat-value{font-family:var(--font-heading); font-size:22px; font-weight:700; margin-top:4px;}

.progress-track{height:10px; border-radius:999px; background:var(--beige); overflow:hidden; margin-top:8px;}
.progress-fill{height:100%; background:linear-gradient(90deg,var(--brown-secondary),var(--brown-primary)); border-radius:999px; transition:width .5s ease;}

.quick-actions{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:14px 0;}
.quick-action{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px 6px;
  display:flex; flex-direction:column; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--text);
  box-shadow:var(--shadow-soft); transition:transform .15s ease;
}
.quick-action:active{transform:scale(.94);}
.quick-action .qa-icon{font-size:18px;}

.quote-card{
  background:linear-gradient(135deg,var(--brown-primary),var(--brown-secondary)); color:var(--white);
  border-radius:var(--radius-lg); padding:18px; margin-top:6px;
}
.quote-card p{color:rgba(248,242,231,0.9); font-style:italic; font-size:14px; line-height:1.5;}

.activity-item{display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--brown-secondary); margin-top:5px; flex:none;}
.activity-text{font-size:13px; font-weight:600;}
.activity-time{font-size:11px; color:var(--text-soft);}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  border:none; border-radius:var(--radius-sm); padding:12px 18px; font-weight:700; font-size:14px;
  transition:transform .15s ease, opacity .2s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--brown-primary); color:var(--white); width:100%;}
.btn-secondary{background:var(--beige); color:var(--text);}
.btn-outline{background:transparent; border:1px solid var(--border); color:var(--text);}
.btn-danger{background:rgba(177,68,68,0.1); color:var(--danger);}
.btn-block{width:100%;}
.btn-sm{padding:8px 12px; font-size:12px; border-radius:8px;}

/* Lists */
.list-item{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px;
  margin-bottom:10px; box-shadow:var(--shadow-soft);
}
.list-item-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.list-item-title{font-weight:700; font-size:15px;}
.list-item-sub{font-size:12px; color:var(--text-soft); margin-top:2px;}
.list-item-actions{display:flex; gap:8px; margin-top:10px;}
.badge{font-size:10px; font-weight:700; padding:4px 9px; border-radius:999px; white-space:nowrap; text-transform:uppercase; letter-spacing:.03em;}
.badge-new{background:#DCE8F5; color:#2C5A8C;}
.badge-contacted{background:#F5E8D2; color:#8C6A2C;}
.badge-interested{background:#E4D9F5; color:#6A3D9A;}
.badge-proposal{background:#F5D9C4; color:#B8592B;}
.badge-client{background:#D6F0DA; color:#2F7A3E;}
.badge-completed{background:#D6F0DA; color:#2F7A3E;}
.badge-lost{background:#F5D6D6; color:#B14444;}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-soft);}
.empty-state .empty-icon{font-size:34px; margin-bottom:10px; opacity:.5;}
.empty-state p{font-size:13px;}

/* Forms */
.form-group{margin-bottom:14px;}
.form-label{display:block; font-size:12px; font-weight:700; color:var(--text-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em;}
.form-input,.form-select,.form-textarea{
  width:100%; padding:12px 14px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:14px;
}
.form-textarea{min-height:80px; resize:vertical;}
.form-row{display:flex; gap:10px;}
.form-row .form-group{flex:1;}

/* Checklist */
.check-item{
  display:flex; align-items:center; gap:12px; padding:13px 14px; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--radius-md); margin-bottom:8px; box-shadow:var(--shadow-soft);
}
.check-box{
  width:22px;height:22px;border-radius:7px;border:2px solid var(--brown-secondary); flex:none;
  display:flex;align-items:center;justify-content:center; font-size:13px; color:transparent; transition:all .2s ease;
}
.check-item.checked .check-box{background:var(--brown-primary); border-color:var(--brown-primary); color:var(--white);}
.check-item.checked .check-label{text-decoration:line-through; color:var(--text-soft);}
.check-label{font-weight:600; font-size:14px; flex:1;}

/* Outreach grid */
.outreach-summary{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.outreach-grid{display:grid; grid-template-columns:repeat(8,1fr); gap:6px;}
.outreach-box{
  aspect-ratio:1; border-radius:7px; background:var(--beige); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:var(--text-soft);
  transition:all .2s ease;
}
.outreach-box.done{background:var(--brown-primary); color:var(--white); border-color:var(--brown-primary); transform:scale(1.03);}

/* Habit tracker */
.habit-row{display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--border);}
.habit-row:last-child{border-bottom:none;}
.habit-name{flex:1; font-weight:600; font-size:13px;}
.habit-streak{font-size:11px; color:var(--brown-secondary); font-weight:700;}
.habit-check{
  width:30px;height:30px;border-radius:9px;border:2px solid var(--border); background:var(--bg);
  display:flex;align-items:center;justify-content:center; color:transparent; flex:none;
}
.habit-check.on{background:var(--success); border-color:var(--success); color:var(--white);}

/* Pipeline */
.pipeline-wrap{display:flex; flex-direction:column; gap:14px;}
.pipeline-stage{background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border); overflow:hidden;}
.pipeline-stage-head{padding:12px 16px; background:var(--beige); display:flex; justify-content:space-between; align-items:center;}
.pipeline-stage-head h4{font-size:13px; font-weight:700;}
.pipeline-count{background:var(--brown-primary); color:var(--white); font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px;}
.pipeline-cards{padding:10px; display:flex; flex-direction:column; gap:8px;}
.pipeline-card{background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; font-size:13px; font-weight:600;}
.pipeline-arrow{text-align:center; color:var(--text-soft); font-size:16px;}

/* Weekly planner */
.day-card{margin-bottom:12px;}
.day-card-head{font-family:var(--font-heading); font-weight:700; font-size:14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}

/* Tables (invoices/reports) */
.doc-preview{background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border); padding:20px; margin-bottom:14px;}
.doc-preview-head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--brown-primary); padding-bottom:14px; margin-bottom:14px;}
.doc-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px;}
.doc-row:last-child{border-bottom:none;}
.doc-total{font-weight:800; font-size:16px; color:var(--brown-primary);}

/* Score ring */
.score-wrap{display:flex; flex-direction:column; align-items:center; padding:10px 0 20px;}
.score-ring{width:120px;height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative;
  background:conic-gradient(var(--brown-primary) calc(var(--score,0)*3.6deg), var(--beige) 0);}
.score-ring::before{content:""; position:absolute; inset:10px; border-radius:50%; background:var(--surface);}
.score-ring span{position:relative; font-family:var(--font-heading); font-size:26px; font-weight:800;}

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(36,24,17,0.5); z-index:200; display:flex; align-items:flex-end; justify-content:center;
  animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{
  background:var(--surface); width:100%; max-width:520px; max-height:88vh; overflow-y:auto;
  border-radius:22px 22px 0 0; padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 24px);
  animation:slideUp .3s cubic-bezier(.2,.9,.3,1.1);
}
@keyframes slideUp{from{transform:translateY(40px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}

/* Toast */
#toast-container{position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:300; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{
  background:var(--brown-primary); color:var(--white); padding:11px 20px; border-radius:999px; font-size:13px; font-weight:600;
  box-shadow:var(--shadow-lift); animation:toastIn .25s ease, toastOut .25s ease 2.4s forwards;
}
@keyframes toastIn{from{opacity:0; transform:translateY(-10px);} to{opacity:1; transform:translateY(0);}}
@keyframes toastOut{to{opacity:0; transform:translateY(-10px);}}

/* Settings */
.settings-row{display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-weight:600; font-size:14px;}
.settings-row-sub{font-size:11px; color:var(--text-soft); margin-top:2px;}
.switch{width:46px; height:26px; border-radius:999px; background:var(--beige); position:relative; border:none; flex:none;}
.switch.on{background:var(--brown-primary);}
.switch::after{content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:var(--white); transition:transform .2s ease;}
.switch.on::after{transform:translateX(20px);}
.color-dot{width:26px;height:26px;border-radius:50%; border:2px solid var(--border);}
.color-dots{display:flex; gap:10px;}
.color-dots .color-dot.selected{border-color:var(--text); box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--text);}

/* Search/filter */
.search-bar{display:flex; gap:8px; margin-bottom:14px;}
.search-bar input{flex:1;}
.filter-chips{display:flex; gap:8px; overflow-x:auto; margin-bottom:14px; scrollbar-width:none;}
.filter-chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto; padding:6px 13px; border-radius:999px; border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:600; color:var(--text-soft);}
.chip.active{background:var(--brown-primary); color:var(--white); border-color:var(--brown-primary);}

.two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.chart-card{background:var(--surface); border-radius:var(--radius-lg); border:1px solid var(--border); padding:16px; margin-bottom:14px; box-shadow:var(--shadow-soft);}
.print-btn-row{display:flex; gap:10px; margin-top:14px;}

@media print{
  #app-header,#bottom-nav,.fab{display:none !important;}
  #content{padding:0;}
}

</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-mark">CH</div>
    <h1>The Creator Business Hub</h1>
    <p>Build your brand. Get clients. Grow your income.</p>
    <div class="splash-loader"><span></span><span></span><span></span></div>
  </div>
</div>

<div id="app" class="hidden">

  <header id="app-header">
    <div class="header-top">
      <div class="brand-mark">
        <span class="brand-mark-icon">CH</span>
        <span class="brand-mark-text">Creator Business Hub</span>
      </div>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark mode">🌙</button>
    </div>
    <nav id="subtabs" class="subtabs" role="tablist"></nav>
  </header>

  <main id="content" role="main"></main>

  <button id="fab" class="fab hidden" aria-label="Quick add">+</button>

  <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main">
    <button class="nav-item active" data-section="dashboard">
      <span class="nav-icon">◆</span><span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" data-section="clients">
      <span class="nav-icon">◈</span><span class="nav-label">Clients</span>
    </button>
    <button class="nav-item" data-section="content">
      <span class="nav-icon">✎</span><span class="nav-label">Content</span>
    </button>
    <button class="nav-item" data-section="finance">
      <span class="nav-icon">₦</span><span class="nav-label">Finance</span>
    </button>
    <button class="nav-item" data-section="resources">
      <span class="nav-icon">▤</span><span class="nav-label">Resources</span>
    </button>
    <button class="nav-item" data-section="settings">
      <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
    </button>
  </nav>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Title</h3>
      <button id="modal-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* =========================================================
   THE CREATOR BUSINESS HUB — app logic
   State lives in localStorage under STORAGE_KEY.
   ========================================================= */
const STORAGE_KEY = 'creatorHubData_v1';

const DEFAULT_DAILY_TASKS = ['Post TikTok','Send Outreach','Follow Up','Study','Portfolio Work'];
const DEFAULT_HABITS = ['Wake Early','Exercise','Read','Outreach','Content','Prayer','Study','Water'];
const CLIENT_STATUSES = ['New','Contacted','Interested','Proposal Sent','Client','Completed','Lost'];
const STATUS_BADGE = {
  'New':'badge-new','Contacted':'badge-contacted','Interested':'badge-interested',
  'Proposal Sent':'badge-proposal','Client':'badge-client','Completed':'badge-completed','Lost':'badge-lost'
};
const PIPELINE_STAGES = [
  {stage:'Lead', statuses:['New']},
  {stage:'Discovery Call', statuses:['Contacted','Interested']},
  {stage:'Proposal', statuses:['Proposal Sent']},
  {stage:'Client', statuses:['Client']},
  {stage:'Completed', statuses:['Completed']}
];
const IDEA_CATEGORIES = ['Educational','Storytelling','Sales','Behind the Scenes','Personal Brand','Food','Business','Productivity'];
const RESOURCE_CATEGORIES = ['Contracts','Invoices','Proposal Templates','Discovery Questions','Hooks','CTA Library','Content Calendar','Canva Links'];
const INCOME_SOURCES = ['NYSC Allowance','School Allowance','Freelance Income','Other Income'];
const EXPENSE_CATEGORIES = ['Food','Transport','Loan','Phone Loan','Data','Family Support','Other'];
const WEEK_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const QUOTES = [
  "Small, consistent outreach beats occasional bursts of motivation.",
  "Clients don't find perfect portfolios. They find people who show up.",
  "Your next client is one honest pitch away.",
  "Discipline in the quiet weeks is what pays out in the loud ones.",
  "You don't need more tools. You need one more conversation.",
  "Booked calendars are built one direct message at a time.",
  "Track it, then trust it — your numbers don't lie to you.",
  "Every 'no' is data. Every 'yes' is proof it works."
];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function formatMoney(n){
  n = Number(n)||0;
  return '₦' + n.toLocaleString('en-NG', {maximumFractionDigits:0});
}
function formatDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}
function monthKey(dateStr){ return (dateStr||todayISO()).slice(0,7); }
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ===== State ===== */
function defaultState(){
  return {
    settings: { theme:'light', accent:'#5C3A21', notifications:true, incomeGoal:150000, userName:'Thia', businessName:'Onyinye Cynthia' },
    dailyPlanner: { tasks: [...DEFAULT_DAILY_TASKS], log:{} },
    outreach: { completed: {} },
    clients: [],
    contentIdeas: [],
    contentPlanner: {},
    income: [],
    expenses: [],
    habits: { list:[...DEFAULT_HABITS], log:{} },
    proposals: [],
    invoices: [],
    brandAudits: [],
    resources: [],
    weeklyReviews: [],
    monthlyReviews: [],
    activity: []
  };
}
let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed, {
      settings: Object.assign(defaultState().settings, parsed.settings||{}),
      dailyPlanner: Object.assign(defaultState().dailyPlanner, parsed.dailyPlanner||{}),
      outreach: Object.assign(defaultState().outreach, parsed.outreach||{}),
      habits: Object.assign(defaultState().habits, parsed.habits||{})
    });
  }catch(e){
    console.error('Failed to load state, starting fresh.', e);
    return defaultState();
  }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function logActivity(text){
  state.activity.unshift({ text, time:new Date().toISOString() });
  state.activity = state.activity.slice(0,20);
  saveState();
}

/* ===== Toast ===== */
function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 2800);
}

/* ===== Modal ===== */
function openModal(title, bodyHtml){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-body').innerHTML = '';
}
function confirmAction(message, onYes){
  openModal('Please confirm', `
    <p style="margin-bottom:18px; font-size:14px; color:var(--text);">${escapeHtml(message)}</p>
    <div class="print-btn-row">
      <button class="btn btn-outline btn-block" id="confirm-no">Cancel</button>
      <button class="btn btn-danger btn-block" id="confirm-yes">Delete</button>
    </div>
  `);
  document.getElementById('confirm-no').onclick = closeModal;
  document.getElementById('confirm-yes').onclick = () => { onYes(); closeModal(); };
}

/* ===== Router ===== */
const SECTIONS = {
  dashboard: { label:'Dashboard', default:'overview', subtabs:[
    {id:'overview',label:'Overview'},{id:'planner',label:'Daily Planner'},
    {id:'outreach',label:'Outreach 100'},{id:'habits',label:'Habits'},
    {id:'weekly',label:'Weekly Review'},{id:'monthly',label:'Monthly Review'}
  ]},
  clients: { label:'Clients', default:'crm', subtabs:[
    {id:'crm',label:'CRM'},{id:'pipeline',label:'Pipeline'},
    {id:'proposals',label:'Proposals'},{id:'invoices',label:'Invoices'},{id:'audit',label:'Brand Audit'}
  ]},
  content: { label:'Content', default:'planner', subtabs:[
    {id:'planner',label:'Weekly Planner'},{id:'ideas',label:'Ideas Library'}
  ]},
  finance: { label:'Finance', default:'income', subtabs:[
    {id:'income',label:'Income'},{id:'expenses',label:'Expenses'}
  ]},
  resources: { label:'Resources', default:'library', subtabs:[
    {id:'library',label:'Library'}
  ]},
  settings: { label:'Settings', default:'', subtabs:[] }
};

let route = { section:'dashboard', subtab:'overview' };

function goTo(section, subtab){
  route.section = section;
  route.subtab = subtab || SECTIONS[section].default;
  render();
}

function render(){
  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.section === route.section);
  });

  const subtabsEl = document.getElementById('subtabs');
  const cfg = SECTIONS[route.section];
  if(cfg.subtabs.length === 0){
    subtabsEl.innerHTML = '';
  } else {
    subtabsEl.innerHTML = cfg.subtabs.map(t => `
      <button class="subtab ${t.id===route.subtab?'active':''}" data-subtab="${t.id}">${t.label}</button>
    `).join('');
    subtabsEl.querySelectorAll('.subtab').forEach(btn=>{
      btn.onclick = () => goTo(route.section, btn.dataset.subtab);
    });
  }

  const content = document.getElementById('content');
  const key = route.section + ':' + route.subtab;
  const renderer = RENDERERS[key] || RENDERERS[route.section] || (()=>'<div class="empty-state">Coming soon.</div>');
  content.innerHTML = renderer();
  wireFab();
  runPostRender(key);
}

const RENDERERS = {};
const POST_RENDER = {};
function runPostRender(key){
  if(POST_RENDER[key]) POST_RENDER[key]();
}

/* ===== FAB ===== */
const FAB_ACTIONS = {
  'clients:crm': ()=>openClientForm(),
  'clients:proposals': ()=>openProposalForm(),
  'clients:invoices': ()=>openInvoiceForm(),
  'clients:audit': ()=>openAuditForm(),
  'content:ideas': ()=>openIdeaForm(),
  'finance:income': ()=>openIncomeForm(),
  'finance:expenses': ()=>openExpenseForm(),
  'resources:library': ()=>openResourceForm(),
  'dashboard:weekly': ()=>openWeeklyReviewForm(),
  'dashboard:monthly': ()=>openMonthlyReviewForm(),
  'dashboard:habits': ()=>openHabitForm()
};
function wireFab(){
  const fab = document.getElementById('fab');
  const key = route.section + ':' + route.subtab;
  if(FAB_ACTIONS[key]){
    fab.classList.remove('hidden');
    fab.onclick = FAB_ACTIONS[key];
  } else {
    fab.classList.add('hidden');
  }
}

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(()=>{
    document.getElementById('splash').style.display='none';
    document.getElementById('app').classList.remove('hidden');
  }, 2000);

  if(state.settings.theme === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-toggle').textContent = '☀️';
  }

  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click', ()=> goTo(btn.dataset.section));
  });
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', (e)=>{
    if(e.target.id==='modal-overlay') closeModal();
  });

  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  }

  render();
});

function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-toggle').textContent = '🌙';
    state.settings.theme = 'light';
  } else {
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-toggle').textContent = '☀️';
    state.settings.theme = 'dark';
  }
  saveState();
}

/* =========================================================
   DASHBOARD: Overview
   ========================================================= */
RENDERERS['dashboard:overview'] = function(){
  const s = state;
  const monthTotal = s.income.filter(i=>monthKey(i.date)===monthKey(todayISO())).reduce((a,b)=>a+Number(b.amount),0);
  const goal = s.settings.incomeGoal || 1;
  const pct = Math.min(100, Math.round((monthTotal/goal)*100));
  const clientCount = s.clients.filter(c=>c.status==='Client'||c.status==='Completed').length;
  const leadCount = s.clients.filter(c=>c.status==='New'||c.status==='Contacted'||c.status==='Interested').length;
  const todayLog = s.dailyPlanner.log[todayISO()] || {};
  const tasksDone = s.dailyPlanner.tasks.filter(t=>todayLog[t]).length;
  const hour = new Date().getHours();
  const greeting = hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const quote = QUOTES[new Date().getDate() % QUOTES.length];

  return `
    <div class="greeting">${greeting}, ${escapeHtml(s.settings.userName)} 👋</div>
    <p class="subgreeting">Here's where your business stands today.</p>

    <div class="card">
      <div class="card-row">
        <div>
          <div class="section-title" style="margin:0;">Monthly Income Goal</div>
          <div class="stat-value">${formatMoney(monthTotal)} <span style="font-size:13px; color:var(--text-soft); font-weight:600;">/ ${formatMoney(goal)}</span></div>
        </div>
        <div style="font-family:var(--font-heading); font-weight:800; color:var(--brown-primary); font-size:18px;">${pct}%</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Clients</div><div class="stat-value">${clientCount}</div></div>
      <div class="stat-card"><div class="stat-label">Leads</div><div class="stat-value">${leadCount}</div></div>
      <div class="stat-card"><div class="stat-label">Tasks Today</div><div class="stat-value">${tasksDone}/${s.dailyPlanner.tasks.length}</div></div>
      <div class="stat-card"><div class="stat-label">Outreach Done</div><div class="stat-value">${Object.keys(s.outreach.completed).length}/100</div></div>
    </div>

    <div class="section-title">Quick Actions</div>
    <div class="quick-actions">
      <button class="quick-action" onclick="openClientForm()"><span class="qa-icon">◈</span>Add Client</button>
      <button class="quick-action" onclick="goTo('clients','proposals'); openProposalForm();"><span class="qa-icon">✎</span>Proposal</button>
      <button class="quick-action" onclick="goTo('finance','income'); openIncomeForm();"><span class="qa-icon">₦</span>Log Income</button>
      <button class="quick-action" onclick="goTo('dashboard','planner')"><span class="qa-icon">☑</span>Planner</button>
    </div>

    <div class="section-title">Recent Activity</div>
    <div class="card">
      ${s.activity.length ? s.activity.slice(0,6).map(a=>`
        <div class="activity-item">
          <div class="activity-dot"></div>
          <div>
            <div class="activity-text">${escapeHtml(a.text)}</div>
            <div class="activity-time">${new Date(a.time).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
          </div>
        </div>
      `).join('') : `<p style="font-size:13px;">No activity yet. Add a client or log income to get started.</p>`}
    </div>

    <div class="quote-card">
      <p>"${quote}"</p>
    </div>
  `;
};

/* =========================================================
   DASHBOARD: Daily Planner
   ========================================================= */
RENDERERS['dashboard:planner'] = function(){
  const log = state.dailyPlanner.log[todayISO()] || {};
  return `
    <div class="section-title" style="margin-top:0;">${formatDate(todayISO())}</div>
    ${state.dailyPlanner.tasks.map(t => `
      <div class="check-item ${log[t]?'checked':''}" data-task="${escapeHtml(t)}">
        <div class="check-box">✓</div>
        <div class="check-label">${escapeHtml(t)}</div>
      </div>
    `).join('')}
    <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="addPlannerTask()">+ Add custom task</button>
  `;
};
POST_RENDER['dashboard:planner'] = function(){
  document.querySelectorAll('#content .check-item').forEach(item=>{
    item.onclick = () => {
      const t = item.dataset.task;
      const log = state.dailyPlanner.log[todayISO()] = state.dailyPlanner.log[todayISO()] || {};
      log[t] = !log[t];
      if(log[t]) logActivity(`Completed "${t}"`); else saveState();
      render();
    };
  });
};
function addPlannerTask(){
  openModal('Add custom task', `
    <div class="form-group"><label class="form-label">Task name</label><input class="form-input" id="new-task-name" placeholder="e.g. Edit reel"></div>
    <button class="btn btn-primary btn-block" id="save-task">Add Task</button>
  `);
  document.getElementById('save-task').onclick = ()=>{
    const val = document.getElementById('new-task-name').value.trim();
    if(!val) return toast('Enter a task name');
    state.dailyPlanner.tasks.push(val);
    saveState(); closeModal(); render(); toast('Task added');
  };
}

/* =========================================================
   DASHBOARD: 100 Brand Outreach Challenge
   ========================================================= */
RENDERERS['dashboard:outreach'] = function(){
  const completed = Object.keys(state.outreach.completed).length;
  const pct = completed;
  let boxes = '';
  for(let i=1;i<=100;i++){
    const done = !!state.outreach.completed[i];
    boxes += `<div class="outreach-box ${done?'done':''}" data-n="${i}">${done?'✓':i}</div>`;
  }
  return `
    <div class="outreach-summary">
      <div>
        <div class="section-title" style="margin:0;">100 Brand Outreach Challenge</div>
        <div class="stat-value">${completed} / 100</div>
      </div>
      <div style="font-family:var(--font-heading); font-weight:800; color:var(--brown-primary); font-size:20px;">${pct}%</div>
    </div>
    <div class="progress-track" style="margin-bottom:16px;"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="outreach-grid">${boxes}</div>
  `;
};
POST_RENDER['dashboard:outreach'] = function(){
  document.querySelectorAll('.outreach-box').forEach(box=>{
    box.onclick = () => {
      const n = box.dataset.n;
      if(state.outreach.completed[n]){ delete state.outreach.completed[n]; }
      else { state.outreach.completed[n] = todayISO(); logActivity(`Outreach box #${n} completed`); }
      saveState(); render();
    };
  });
};

/* =========================================================
   DASHBOARD: Habit Tracker
   ========================================================= */
function habitStreak(habit){
  let streak = 0;
  let d = new Date();
  while(true){
    const key = d.toISOString().slice(0,10);
    if(state.habits.log[key] && state.habits.log[key][habit]){
      streak++; d.setDate(d.getDate()-1);
    } else break;
  }
  return streak;
}
RENDERERS['dashboard:habits'] = function(){
  const log = state.habits.log[todayISO()] || {};
  return `
    <div class="section-title" style="margin-top:0;">Today · ${formatDate(todayISO())}</div>
    <div class="card">
      ${state.habits.list.map(h => `
        <div class="habit-row">
          <div class="habit-check ${log[h]?'on':''}" data-habit="${escapeHtml(h)}">✓</div>
          <div class="habit-name">${escapeHtml(h)}</div>
          <div class="habit-streak">${habitStreak(h)} day streak</div>
          <button class="icon-btn" style="width:28px;height:28px;font-size:12px;margin-left:6px;" onclick="deleteHabit('${escapeHtml(h)}')">✕</button>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-outline btn-block" style="margin-top:10px;" onclick="openHabitForm()">+ Add custom habit</button>
  `;
};
POST_RENDER['dashboard:habits'] = function(){
  document.querySelectorAll('.habit-check').forEach(el=>{
    el.onclick = () => {
      const h = el.dataset.habit;
      const log = state.habits.log[todayISO()] = state.habits.log[todayISO()] || {};
      log[h] = !log[h];
      saveState(); render();
    };
  });
};
function openHabitForm(){
  openModal('Add custom habit', `
    <div class="form-group"><label class="form-label">Habit name</label><input class="form-input" id="new-habit-name" placeholder="e.g. Meditate"></div>
    <button class="btn btn-primary btn-block" id="save-habit">Add Habit</button>
  `);
  document.getElementById('save-habit').onclick = ()=>{
    const val = document.getElementById('new-habit-name').value.trim();
    if(!val) return toast('Enter a habit name');
    if(state.habits.list.includes(val)) return toast('That habit already exists');
    state.habits.list.push(val);
    saveState(); closeModal(); render(); toast('Habit added');
  };
}
function deleteHabit(h){
  confirmAction(`Remove "${h}" from your habit tracker?`, ()=>{
    state.habits.list = state.habits.list.filter(x=>x!==h);
    saveState(); render(); toast('Habit removed');
  });
}

/* =========================================================
   DASHBOARD: Weekly Review
   ========================================================= */
RENDERERS['dashboard:weekly'] = function(){
  const items = [...state.weeklyReviews].sort((a,b)=>b.weekOf.localeCompare(a.weekOf));
  return `
    <div class="section-title" style="margin-top:0;">Weekly Reviews</div>
    ${items.length? items.map(r=>`
      <div class="list-item">
        <div class="list-item-top">
          <div><div class="list-item-title">Week of ${formatDate(r.weekOf)}</div></div>
          <button class="icon-btn" onclick="deleteWeeklyReview('${r.id}')">✕</button>
        </div>
        <p style="font-size:12px; margin-top:8px;"><strong>Wins:</strong> ${escapeHtml(r.wins)}</p>
        <p style="font-size:12px; margin-top:4px;"><strong>Challenges:</strong> ${escapeHtml(r.challenges)}</p>
        <p style="font-size:12px; margin-top:4px;"><strong>Lessons:</strong> ${escapeHtml(r.lessons)}</p>
        <p style="font-size:12px; margin-top:4px;"><strong>Income:</strong> ${formatMoney(r.income)} &nbsp; <strong>Clients:</strong> ${escapeHtml(r.clients)}</p>
        <p style="font-size:12px; margin-top:4px;"><strong>Goals next week:</strong> ${escapeHtml(r.goals)}</p>
      </div>
    `).join('') : `<div class="empty-state"><div class="empty-icon">📝</div><p>No weekly reviews yet. Tap + to log this week.</p></div>`}
  `;
};
function openWeeklyReviewForm(){
  openModal('Weekly Review', `
    <div class="form-group"><label class="form-label">Week of</label><input type="date" class="form-input" id="wr-week" value="${todayISO()}"></div>
    <div class="form-group"><label class="form-label">Wins</label><textarea class="form-textarea" id="wr-wins" placeholder="What went well?"></textarea></div>
    <div class="form-group"><label class="form-label">Challenges</label><textarea class="form-textarea" id="wr-challenges"></textarea></div>
    <div class="form-group"><label class="form-label">Lessons</label><textarea class="form-textarea" id="wr-lessons"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Income this week</label><input type="number" class="form-input" id="wr-income" placeholder="0"></div>
      <div class="form-group"><label class="form-label">Clients</label><input class="form-input" id="wr-clients" placeholder="e.g. 2 new leads"></div>
    </div>
    <div class="form-group"><label class="form-label">Goals for next week</label><textarea class="form-textarea" id="wr-goals"></textarea></div>
    <button class="btn btn-primary btn-block" id="wr-save">Save Review</button>
  `);
  document.getElementById('wr-save').onclick = ()=>{
    state.weeklyReviews.push({
      id:uid(), weekOf:document.getElementById('wr-week').value||todayISO(),
      wins:document.getElementById('wr-wins').value, challenges:document.getElementById('wr-challenges').value,
      lessons:document.getElementById('wr-lessons').value, income:document.getElementById('wr-income').value||0,
      clients:document.getElementById('wr-clients').value, goals:document.getElementById('wr-goals').value
    });

function currentWeekStart(){
  const d = new Date();
  const day = d.getDay();
  const diff = (day===0? -6 : 1) - day;
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
let plannerWeek = currentWeekStart();
RENDERERS['content:planner'] = function(){
  state.contentPlanner[plannerWeek] = state.contentPlanner[plannerWeek] || {};
  const week = state.contentPlanner[plannerWeek];
  return `
    <div class="card-row" style="margin-bottom:14px;">
      <button class="btn btn-outline btn-sm" onclick="shiftPlannerWeek(-1)">← Prev</button>
      <div style="font-weight:700; font-size:13px;">Week of ${formatDate(plannerWeek)}</div>
      <button class="btn btn-outline btn-sm" onclick="shiftPlannerWeek(1)">Next →</button>
    </div>
    ${WEEK_DAYS.map(day => {
      const entry = week[day] || {platform:'',caption:'',type:'',status:'Planned'};
      return `
        <div class="card day-card">
          <div class="day-card-head"><span>${day}</span><span class="badge ${entry.status==='Posted'?'badge-completed':entry.status==='Scheduled'?'badge-proposal':'badge-new'}">${entry.status}</span></div>
          <div class="form-group"><label class="form-label">Platform</label><input class="form-input planner-field" data-day="${day}" data-field="platform" value="${escapeHtml(entry.platform)}" placeholder="TikTok, IG, Facebook..."></div>
          <div class="form-group"><label class="form-label">Caption</label><textarea class="form-textarea planner-field" data-day="${day}" data-field="caption" placeholder="Caption / hook">${escapeHtml(entry.caption)}</textarea></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Content Type</label><input class="form-input planner-field" data-day="${day}" data-field="type" value="${escapeHtml(entry.type)}" placeholder="Reel, Carousel..."></div>
            <div class="form-group"><label class="form-label">Status</label>
              <select class="form-select planner-field" data-day="${day}" data-field="status">
                ${['Planned','Scheduled','Posted'].map(s=>`<option ${entry.status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
      `;
    }).join('')}
  `;
};
POST_RENDER['content:planner'] = function(){
  document.querySelectorAll('.planner-field').forEach(el=>{
    el.onchange = () => {
      const day = el.dataset.day, field = el.dataset.field;
      const week = state.contentPlanner[plannerWeek] = state.contentPlanner[plannerWeek] || {};
      week[day] = week[day] || {platform:'',caption:'',type:'',status:'Planned'};
      week[day][field] = el.value;
      saveState();
      if(field==='status') render();
    };
  });
};
function shiftPlannerWeek(dir){
  const d = new Date(plannerWeek+'T00:00:00');
  d.setDate(d.getDate() + dir*7);
  plannerWeek = d.toISOString().slice(0,10);
  render();
}

/* =========================================================
   FINANCE: Income Tracker
   ========================================================= */
RENDERERS['finance:income'] = function(){
  const items = [...state.income].sort((a,b)=>b.date.localeCompare(a.date));
  const total = items.reduce((a,b)=>a+Number(b.amount),0);
  const byMonthTotal = items.filter(i=>monthKey(i.date)===monthKey(todayISO())).reduce((a,b)=>a+Number(b.amount),0);
  const goal = state.settings.incomeGoal || 1;
  const pct = Math.min(100, Math.round((byMonthTotal/goal)*100));
  const bySource = INCOME_SOURCES.map(src => ({src, total: items.filter(i=>i.source===src).reduce((a,b)=>a+Number(b.amount),0)}));
  return `
    <div class="card">
      <div class="section-title" style="margin:0;">This Month vs Goal</div>
      <div class="stat-value">${formatMoney(byMonthTotal)} <span style="font-size:13px; color:var(--text-soft); font-weight:600;">/ ${formatMoney(goal)}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">All-Time Income</div><div class="stat-value">${formatMoney(total)}</div></div>
      <div class="stat-card"><div class="stat-label">Entries</div><div class="stat-value">${items.length}</div></div>
    </div>
    <div class="chart-card"><canvas id="income-chart" height="180"></canvas></div>
    <div class="section-title">By Source</div>
    <div class="card">
      ${bySource.map(b=>`<div class="doc-row"><span>${b.src}</span><span>${formatMoney(b.total)}</span></div>`).join('')}
    </div>
    <div class="section-title">Entries</div>
    ${items.length ? items.map(i=>`
      <div class="list-item">
        <div class="list-item-top">
          <div><div class="list-item-title">${formatMoney(i.amount)}</div><div class="list-item-sub">${i.source} · ${formatDate(i.date)}</div></div>
          <button class="icon-btn" onclick="deleteIncome('${i.id}')">✕</button>
        </div>
      </div>
    `).join('') : `<div class="empty-state"><div class="empty-icon">₦</div><p>No income logged yet.</p></div>`}
  `;
};
POST_RENDER['finance:income'] = function(){
  const canvas = document.getElementById('income-chart');
  if(!canvas || typeof Chart==='undefined') return;
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    months.push(d.toISOString().slice(0,7));
  }
  const data = months.map(m => state.income.filter(x=>monthKey(x.date)===m).reduce((a,b)=>a+Number(b.amount),0));
  new Chart(canvas, {
    type:'bar',
    data:{ labels: months.map(m=>new Date(m+'-01').toLocaleDateString('en-GB',{month:'short'})), datasets:[{label:'Income', data, backgroundColor:'#8B5E3C', borderRadius:6}]},
    options:{ plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
  });
};
function openIncomeForm(){
  openModal('Log Income', `
    <div class="form-group"><label class="form-label">Source</label>
      <select class="form-select" id="inc-source">${INCOME_SOURCES.map(s=>`<option>${s}</option>`).join('')}</select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Amount</label><input type="number" class="form-input" id="inc-amount"></div>
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="inc-date" value="${todayISO()}"></div>
    </div>
    <button class="btn btn-primary btn-block" id="inc-save">Save Income</button>
  `);
  document.getElementById('inc-save').onclick = ()=>{
    const amount = Number(document.getElementById('inc-amount').value);
    if(!amount) return toast('Enter an amount');
    state.income.push({id:uid(), source:document.getElementById('inc-source').value, amount, date:document.getElementById('inc-date').value||todayISO()});
    logActivity(`Logged income: ${formatMoney(amount)}`);
    saveState(); closeModal(); render(); toast('Income logged');
  };
}
function deleteIncome(id){
  state.income = state.income.filter(i=>i.id!==id);
  saveState(); render(); toast('Deleted');
}

/* =========================================================
   FINANCE: Expense Tracker
   ========================================================= */
RENDERERS['finance:expenses'] = function(){
  const items = [...state.expenses].sort((a,b)=>b.date.localeCompare(a.date));
  const monthIncome = state.income.filter(i=>monthKey(i.date)===monthKey(todayISO())).reduce((a,b)=>a+Number(b.amount),0);
  const monthExpenses = items.filter(i=>monthKey(i.date)===monthKey(todayISO())).reduce((a,b)=>a+Number(b.amount),0);
  const remaining = monthIncome - monthExpenses;
  const byCategory = EXPENSE_CATEGORIES.map(cat => ({cat, total: items.filter(i=>i.category===cat).reduce((a,b)=>a+Number(b.amount),0)})).filter(c=>c.total>0);
  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Monthly Expenses</div><div class="stat-value">${formatMoney(monthExpenses)}</div></div>
      <div class="stat-card"><div class="stat-label">Remaining Balance</div><div class="stat-value" style="color:${remaining>=0?'var(--success)':'var(--danger)'}">${formatMoney(remaining)}</div></div>
    </div>
    <div class="chart-card"><canvas id="expense-chart" height="180"></canvas></div>
    <div class="section-title">By Category</div>
    <div class="card">
      ${byCategory.length? byCategory.map(b=>`<div class="doc-row"><span>${b.cat}</span><span>${formatMoney(b.total)}</span></div>`).join('') : `<p style="font-size:13px;">No expenses logged yet.</p>`}
    </div>
    <div class="section-title">Entries</div>
    ${items.length ? items.map(i=>`
      <div class="list-item">
        <div class="list-item-top">
          <div><div class="list-item-title">${formatMoney(i.amount)}</div><div class="list-item-sub">${i.category} · ${formatDate(i.date)}</div></div>
          <button class="icon-btn" onclick="deleteExpense('${i.id}')">✕</button>
        </div>
      </div>
    `).join('') : `<div class="empty-state"><div class="empty-icon">💸</div><p>No expenses logged yet.</p></div>`}
  `;
};
POST_RENDER['finance:expenses'] = function(){
  const canvas = document.getElementById('expense-chart');
  if(!canvas || typeof Chart==='undefined') return;
  const byCategory = EXPENSE_CATEGORIES.map(cat => ({cat, total: state.expenses.filter(i=>i.category===cat).reduce((a,b)=>a+Number(b.amount),0)}));
  const nonZero = byCategory.filter(c=>c.total>0);
  if(!nonZero.length) return;
  new Chart(canvas, {
    type:'bar',
    data:{ labels: nonZero.map(c=>c.cat), datasets:[{label:'Expenses', data: nonZero.map(c=>c.total), backgroundColor:'#B8792B', borderRadius:6}]},
    options:{ plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}, indexAxis:'y' }
  });
};

  document.getElementById('exp-save').onclick = ()=>{

    state.expenses.push({id:uid(), category:document.getElementById('exp-cat').value, amount, date:document.getElementById('exp-date').value||todayISO()});

function deleteExpense(id){

/* =========================================================
   SETTINGS
   ========================================================= */
const ACCENT_OPTIONS = ['#5C3A21','#8B5E3C','#B14444','#3E7A4D','#2C5A8C','#6A3D9A'];
RENDERERS['settings'] = function(){
  const s = state.settings;
  const dataSize = Math.round(new Blob([JSON.stringify(state)]).size / 1024);
  return `
    <div class="section-title" style="margin-top:0;">Profile</div>
    <div class="card">
      <div class="form-group"><label class="form-label">Your Name</label><input class="form-input" id="st-name" value="${escapeHtml(s.userName)}"></div>
      <div class="form-group"><label class="form-label">Business Name</label><input class="form-input" id="st-biz" value="${escapeHtml(s.businessName)}"></div>
      <div class="form-group" style="margin-bottom:0;"><label class="form-label">Monthly Income Goal (₦)</label><input type="number" class="form-input" id="st-goal" value="${s.incomeGoal}"></div>
    </div>

    <div class="section-title">Appearance</div>
    <div class="card">
      <div class="settings-row">
        <div><div class="settings-row-label">Dark Mode</div><div class="settings-row-sub">Switch between light and dark</div></div>
        <button class="switch ${s.theme==='dark'?'on':''}" id="st-theme-switch"></button>
      </div>
      <div class="settings-row">
        <div><div class="settings-row-label">Theme Color</div><div class="settings-row-sub">Accent used across the app</div></div>
        <div class="color-dots">
          ${ACCENT_OPTIONS.map(c=>`<button class="color-dot ${s.accent===c?'selected':''}" data-color="${c}" style="background:${c}"></button>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-title">Notifications</div>
    <div class="card">
      <div class="settings-row" style="border-bottom:none; padding-bottom:0;">
        <div><div class="settings-row-label">Task & Habit Reminders</div><div class="settings-row-sub">Local reminders for planner and habits</div></div>
        <button class="switch ${s.notifications?'on':''}" id="st-notif-switch"></button>
      </div>
    </div>

    <div class="section-title">Data</div>
    <div class="card">
      <p style="font-size:12px; margin-bottom:12px;">Your data is stored only on this device (${dataSize} KB). Back it up regularly — clearing your browser or switching devices will lose anything not backed up.</p>
      <div class="print-btn-row">
        <button class="btn btn-secondary btn-block" id="st-backup">Backup Data</button>
        <button class="btn btn-outline btn-block" id="st-restore-btn">Restore Data</button>
      </div>
      <input type="file" id="st-restore-file" accept="application/json" class="hidden">
      <button class="btn btn-danger btn-block" style="margin-top:10px;" id="st-reset">Reset All Data</button>
    </div>

    <button class="btn btn-primary btn-block" id="st-save" style="margin-top:6px;">Save Settings</button>
  `;
};
POST_RENDER['settings'] = function(){
  document.getElementById('st-theme-switch').onclick = () => { toggleTheme(); render(); };
  document.querySelectorAll('.color-dot').forEach(dot=>{
    dot.onclick = () => {
      state.settings.accent = dot.dataset.color;
      document.documentElement.style.setProperty('--brown-primary', dot.dataset.color);
      saveState(); render();
    };
  });
  document.getElementById('st-notif-switch').onclick = () => {
    state.settings.notifications = !state.settings.notifications;
    saveState(); render();
  };
  document.getElementById('st-save').onclick = () => {
    state.settings.userName = document.getElementById('st-name').value || 'Creator';
    state.settings.businessName = document.getElementById('st-biz').value || 'My Business';
    state.settings.incomeGoal = Number(document.getElementById('st-goal').value) || 0;
    saveState(); toast('Settings saved'); render();
  };
  document.getElementById('st-backup').onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `creator-hub-backup-${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Backup downloaded');
  };
  document.getElementById('st-restore-btn').onclick = () => document.getElementById('st-restore-file').click();
  document.getElementById('st-restore-file').onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        confirmAction('Restoring will replace all current data with this backup. Continue?', () => {
          state = Object.assign(defaultState(), parsed);
          saveState(); toast('Data restored'); render();
        });
      }catch(err){ toast('Invalid backup file'); }
    };
    reader.readAsText(file);
  };
  document.getElementById('st-reset').onclick = () => {
    confirmAction('This will permanently erase all clients, income, content, and settings on this device. This cannot be undone.', () => {
      localStorage.removeItem(STORAGE_KEY);
      state = defaultState();
      document.documentElement.removeAttribute('data-theme');
      document.documentElement.style.removeProperty('--brown-primary');
      toast('All data reset');
      goTo('dashboard','overview');
    });
  };
};

</script>
